name: Laravel CI

on:
  push:
  pull_request:

jobs:
  laravel-ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup PHP 8.5 dengan coverage driver pcov
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath
          coverage: pcov

      # 3. Cache Composer dependencies
      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # Install Composer dependency (Backend dependencies)
      - name: Install Composer Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # 4. Copy .env.example menjadi .env
      - name: Copy Environment File
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      # 5. Generate APP_KEY
      - name: Generate Application Key
        run: php artisan key:generate

      # 6. Install seluruh dependency project (Frontend dependencies)
      - name: Get NPM Cache Directory
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache Node Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      # 7. Buat database testing menggunakan SQLite (untuk langkah migration)
      - name: Create SQLite Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      # 8. Jalankan migration
      - name: Run Migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      # 9. Jalankan seluruh automated testing menggunakan Pest dengan code coverage
      - name: Run Tests with Coverage
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: |
          ./vendor/bin/pest \
            --coverage \
            --coverage-clover=clover.xml \
            --coverage-html=html-coverage

          cp clover.xml coverage.xml

      # 10. Simpan hasil coverage sebagai artifact GitHub Actions sehingga dapat diunduh
      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            clover.xml
            html-coverage/
