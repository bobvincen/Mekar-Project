name: Coverage Report

on:
  workflow_run:
    workflows: ["Laravel CI"]
    types:
      - completed

jobs:
  coverage:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup PHP 8.5 dengan coverage driver pcov
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath
          coverage: pcov

      # Cache Composer dependencies
      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # Install Composer dependency (Backend dependencies)
      - name: Install Composer Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # Copy .env.example menjadi .env
      - name: Copy Environment File
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      # Generate APP_KEY
      - name: Generate Application Key
        run: php artisan key:generate

      # Install seluruh dependency project (Frontend dependencies)
      - name: Get NPM Cache Directory
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache Node Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: Run Tests with Coverage
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: |
          ./vendor/bin/pest \
            --coverage \
            --coverage-clover=clover.xml \
            --coverage-html=html-coverage

          cp clover.xml coverage.xml

      # Simpan hasil coverage sebagai artifact GitHub Actions sehingga dapat diunduh
      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            clover.xml
            html-coverage/
